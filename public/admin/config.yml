backend:
  name: test-repo  # 本地测试用，不连真实仓库
  repo: test/test
local_backend: true
media_folder: public/images
public_folder: /public
collections:
  - name: blog
    label: Blog
    folder: src/pages/zh/blog
    create: true
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "日期", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      
      # 👇 新增：让编辑者选择布局（或用 hidden 固定默认值）
      - label: "页面布局"
        name: "layout"
        default: "src/layouts/BlogPost.astro"
        required: true
      - label: "标签"
        name: "tags"
        widget: "list"
      - { label: "内容", name: "body", widget: "markdown" }